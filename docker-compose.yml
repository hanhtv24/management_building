version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: building_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: building_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: building_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@building.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata: